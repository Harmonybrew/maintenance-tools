name: Force Migrate

on:
  workflow_dispatch:
    inputs:
      formula:
        description: '要强制迁移的 Formula 名称（如 hello、python@3.12）'
        required: true
        type: string

jobs:
  force-migrate:
    runs-on: ubuntu-24.04-arm
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. 配置 Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # 3. 安装 requests
      - name: Install dependencies
        run: pip install requests

      # 4. 强制迁移指定 Formula
      #     使用 --force 模式，跳过“是否已迁移”和“PR 是否已存在”等校验
      - name: Force Migrate
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
          ATOMGIT_USER: ${{ secrets.ATOMGIT_USER }}
          ATOMGIT_EMAIL: ${{ secrets.ATOMGIT_EMAIL }}
        run: ./force-migrate.sh "${{ inputs.formula }}"
